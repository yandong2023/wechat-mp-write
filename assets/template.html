<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{TITLE}}</title>
    <style>
        /* 基础重置 - 微信原生风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 正文容器 - 微信标准宽度 */
        .rich_media_content {
            max-width: 100%;
            padding: 20px 16px;
            font-size: 17px;
            line-height: 1.75;
            color: #333;
            letter-spacing: 0.02em;
        }
        
        /* 标题样式 - 微信原生风格 */
        .rich_media_content h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: left;
            margin: 0 0 24px 0;
            color: #000;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }
        
        .rich_media_content h2 {
            font-size: 19px;
            font-weight: 600;
            margin: 28px 0 16px 0;
            color: #000;
            line-height: 1.4;
            letter-spacing: -0.01em;
        }
        
        .rich_media_content h3 {
            font-size: 17px;
            font-weight: 600;
            margin: 24px 0 12px 0;
            color: #222;
            line-height: 1.4;
        }
        
        /* 段落 - 微信标准行距 */
        .rich_media_content p {
            font-size: 17px;
            line-height: 1.75;
            margin: 0 0 20px 0;
            color: #333;
            text-align: justify;
            word-wrap: break-word;
            word-break: break-all;
        }
        
        /* 强调 - 微信风格 */
        .rich_media_content strong {
            color: #000;
            font-weight: 600;
        }
        
        .rich_media_content em {
            font-style: italic;
            color: #555;
        }
        
        /* 引用块 - 微信原生灰色左边框 */
        .rich_media_content blockquote {
            border-left: 3px solid #d9d9d9;
            padding: 0 0 0 16px;
            margin: 20px 0;
            color: #666;
            font-size: 16px;
            line-height: 1.7;
        }
        
        .rich_media_content blockquote p {
            font-size: 16px;
            color: #666;
            margin: 0;
        }
        
        /* 列表 - 微信标准样式 */
        .rich_media_content ul, .rich_media_content ol {
            margin: 0 0 20px 0;
            padding-left: 24px;
        }
        
        .rich_media_content li {
            margin: 8px 0;
            line-height: 1.75;
            font-size: 17px;
        }
        
        .rich_media_content ul li {
            list-style-type: disc;
        }
        
        .rich_media_content ul li::marker {
            color: #999;
        }
        
        /* 链接 - 微信蓝 */
        .rich_media_content a {
            color: #576b95;
            text-decoration: none;
        }
        
        .rich_media_content a:hover {
            text-decoration: underline;
        }
        
        /* 图片 - 微信原生 */
        .rich_media_content img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            display: block;
            border-radius: 4px;
        }
        
        /* 表格 - 微信简洁风格 */
        .rich_media_content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .rich_media_content th, .rich_media_content td {
            padding: 12px 8px;
            border: 1px solid #e5e5e5;
            text-align: left;
        }
        
        .rich_media_content th {
            background: #fafafa;
            font-weight: 600;
            color: #000;
        }
        
        .rich_media_content td {
            color: #333;
        }
        
        .rich_media_content tr:nth-child(even) {
            background: #fafafa;
        }
        
        /* 代码 - 微信灰底 */
        .rich_media_content pre {
            background: #f6f6f6;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
        }
        
        .rich_media_content code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 14px;
            color: #c41e3a;
        }
        
        .rich_media_content pre code {
            background: transparent;
            padding: 0;
            color: #333;
        }
        
        /* 分割线 - 微信浅灰 */
        .rich_media_content hr {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 28px 0;
        }
        
        /* 小标题/标签 - 微信风格 */
        .rich_media_content .section-title {
            font-size: 15px;
            color: #999;
            margin: 24px 0 12px 0;
            font-weight: 400;
        }
        
        /* 高亮文本 */
        .rich_media_content mark {
            background: #fff3cd;
            padding: 2px 4px;
            border-radius: 2px;
        }
        
        /* 特殊盒子 - 微信原生风格 */
        .tip-box {
            background: #f7f7f7;
            border-radius: 4px;
            padding: 16px;
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.7;
        }
        
        .tip-box p:last-child {
            margin-bottom: 0;
        }
        
        /* 作者信息区 */
        .author-section {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e5;
            font-size: 15px;
            color: #666;
        }
        
        /* 移动端优化 */
        @media screen and (max-width: 375px) {
            .rich_media_content {
                padding: 16px 15px;
            }
            
            .rich_media_content h1 {
                font-size: 22px;
            }
            
            .rich_media_content h2 {
                font-size: 18px;
            }
            
            .rich_media_content p,
            .rich_media_content li {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="rich_media_content">
        {{CONTENT}}
    </div>
</body>
</html>
